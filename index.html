# Plano — Sistema de Locação Corporativa de Bicicletas (Intranet Lev)

> **Status:** plano detalhado para validação. Execução vem depois.
> **Autor:** Tecnologia Golev (Victor) com apoio de IA.
> **Data:** 2026-06-29.
> **Fontes:** Reunião 29/06/2026 (Yuri Santana × Victor — diagnóstico do setor) e Reunião 26/06/2026 (Curi/condomínio — produto futuro de bikes compartilhadas). Mapeamento técnico da intranet (7 subsistemas) + crítica de viabilidade.

---

## 0. Como ler este documento

- **Seções 1–3:** contexto, diagnóstico e visão geral. Leia para entender o problema.
- **Seções 4–6:** o sistema em si — atores, módulos detalhados, modelo de dados. É o coração do "tudo que o sistema deve contemplar".
- **Seções 7–9:** como isso encaixa no que já existe (reúso), a realidade da integração Sankhya, e os riscos.
- **Seção 10:** decisões que dependem de você/Rodrigo/Jean **antes** de codar.
- **Seção 11:** sequenciamento sugerido (ondas) — o "depois pensamos na execução", já rascunhado.

Princípio que atravessa o plano inteiro: **Supabase-first**. O estado vivo da locação (contrato, frota, OS, peças, cobrança) mora na nossa base; o Sankhya é tratado como **sistema de registro fiscal/cadastral de leitura** e só recebe escrita nos marcos fiscais, atrás de flag — porque a escrita de documento no ERP já foi provada e **abandonada** no projeto de Obras por causa dos gatilhos fiscais (detalhe na Seção 8).

---

## 1. O que é "Locação Corporativa" na Lev

Setor que **aluga bicicletas (e e-bikes) para empresas** mediante **mensalidade + serviço/peça**, com manutenção feita por mecânicos próprios que vão a campo. Não é venda; é locação recorrente com assistência.

**Clientes hoje (B2B):** Zona Sul (3 bases/mercados, frota numerada por chassi), Claro, Vivo, Google, e mais ~2 empresas. Modelo: cliente aluga, paga mensalidade, e a Lev faz manutenção preventiva/corretiva no local do cliente.

**Estrutura da equipe:**

| Papel | Pessoa | Função |
|---|---|---|
| Líder | Fábio | Coordena tudo; gargalo operacional (muita coisa só anda com ele presente; gera ~5 "diários" manuais) |
| Administrativo | Carol | "Mini-Lev sozinha": monta OS/orçamento no Sankhya, fala com cliente e mecânicos no WhatsApp, controla ponto/passagem, compra peça na rua, replica dados no Notion |
| Mecânicos (3) | — | Vão de moto (2 motos cada) a campo; preparam/customizam bikes, fazem manutenção/revisão; carregam peças no baú |
| Apoio (novo) | Alexandre | Ex-estoquista (período de experiência 90 dias); ajuda na estruturação, fica em São Cristóvão |

**Setores que a locação cruza:** Fiscal, Compras, Estoque, Oficina Central (OC), Restauração, atendimento. (Yuri: "envolve mais setores que o e-commerce".)

**Há também um produto adjacente, futuro:** bikes **compartilhadas em condomínio** (parceria **Curi**, modelo E-bike L) — app do morador (destravar/travar, GPS, bateria, caução no cartão), painel do síndico, contrato de manutenção pós-garantia. Mesmo setor, mesma equipe de campo, mas é **outro produto** (B2C/condomínio) e **não entra no MVP corporativo** (Seção 5, M10).

---

## 2. Diagnóstico — dores atuais (do diagnóstico do Yuri)

1. **Tudo manual e espalhado.** Demanda nasce em **grupo de WhatsApp** (Zona Sul) ou no **VOLL** (demais). Carol "traduz" do WhatsApp para o Sankhya e ainda replica no Notion → **o mesmo trabalho feito 3×**.
2. **Sem OS fácil para o mecânico.** Mecânicos só "jogam no grupo" o que fizeram, sem evidência estruturada → **disputas com o cliente** ("fez/não fez", "aconteceu/não aconteceu").
3. **Sem controle do estoque móvel (baú da moto).** Sem inventário, sem número de série, sem registro de consumo nem devolução. **Única fuga não controlada de produto** — reforçada por um **incidente de segurança recente** com um funcionário. O inspetor (Schubert) e a Anne pediram **controle de tudo que entra e sai** + **evidência (foto) antes e depois**.
4. **Compra reativa.** Falta peça básica (câmara de ar, pastilha de freio); solicitação de crédito demora 2–3 dias; cliente espera. **Não se mede demanda represada nem venda perdida** por falta de estoque.
5. **Carol sobrecarregada** com tarefas repetitivas; **Fábio é gargalo** (processos dependem da presença física dele).
6. **Financeiro sem visibilidade de inadimplência.** "Está na mão do financeiro, eu nem olho" (Fábio). Hoje a cobrança é um **e-mail** para o financeiro emitir boleto (mensalidade + serviço + peça); não há controle formal de inadimplência.
7. **Módulo de locação do Sankhya foi descartado** — caro (~R$ 6–7 mil/mês, escalando por contrato) e pouco flexível. Decisão: **construir interno** no Lev.
8. **VOLL como integração foi descartada** — fornecedor difícil de contatar; "o Lev tá ficando muito maneiro, não quero mais integração de fora".

**Objetivo central acordado na reunião:** _"ter uma interface com o cliente e organizar os processos dentro do setor de locação corporativa"_ — começando pela **parte administrativa (Carol)** e depois a **parte prática (mecânicos)**, com micro-processos que funcionem isolados e depois se conectem.

---

## 3. Visão do sistema

Um módulo de intranet em `/intranet/locacao` que digitaliza o ciclo completo da locação corporativa: **cliente/contrato/frota → entrada de demanda → OS de campo → orçamento/aprovação → execução com controle de peças → faturamento → painéis**. Mobile-first para o mecânico, desktop para Carol/Fábio/financeiro.

```mermaid
flowchart TD
    subgraph Entrada["1. Entrada de demanda"]
      WA[Grupo WhatsApp cliente] --> DESK
      VOLL[VOLL / chamado] --> DESK
      CHAT[Chatbot site - lead B2B novo] --> PIPE[Pipeline B2B / demanda represada]
      MAN[Carol manual] --> DESK[Canal/Inbox da Locação]
    end

    DESK --> OS[2. Ordem de Serviço de campo]
    OS -->|mecânico em campo| LAUDO[Laudo diagnóstico + foto antes]
    LAUDO --> ORC[3. Orçamento]
    ORC -->|link durável| CLI[Aprovação do cliente]
    CLI --> EXEC[Execução + consumo de peça]
    EXEC --> BAU[(4. Custódia de peças no baú)]
    EXEC --> FECH[Laudo de fechamento + foto depois]
    FECH --> FAT[5. Faturamento: mensalidade + serviço + peça]
    FAT --> FIN[Financeiro / inadimplência]

    BAU -.->|reposição modelo Obras| COMPRAS[Solicitação de peça → aprovação Carol]
    COMPRAS -.->|OS não atendida por falta| REPRES[Medição de demanda represada]

    OS --> PAINEL[6. Painéis: Fábio / Carol / Financeiro / Gestão]
    FAT --> PAINEL
    BAU --> PAINEL
```

**Os 10 módulos** (detalhados na Seção 5):

| # | Módulo | Dor que resolve | Onda |
|---|---|---|---|
| M1 | Clientes, contratos e frota corporativa | Sem cadastro estruturado de quem aluga o quê | 1 |
| M2 | Entrada de demanda (Inbox/Desk + lead B2B) | Demanda perdida no WhatsApp; 3× retrabalho | 1–2 |
| M3 | Ordem de Serviço de campo (mobile, áudio→IA, foto) | Sem OS fácil; sem evidência; disputas | 1 |
| M4 | Orçamento + aprovação durável do cliente | Aprovação por WhatsApp some; "não fez" | 1 |
| M5 | **Custódia de peças no baú da moto** | Desvio/perda; pedido do Schubert/Anne | 1 |
| M6 | Reposição de peças (modelo Obras) + demanda represada | Compra reativa; falta de peça básica; cegueira | 2 |
| M7 | Faturamento (mensalidade recorrente + serviço + peça) + inadimplência | Cobrança por e-mail; financeiro às cegas | 2 |
| M8 | Painéis e KPIs | Fábio gargalo; sem visibilidade | 1–2 |
| M9 | Integração fiscal Sankhya (espelho, atrás de flag) | Carol digita 2–3× | 3 |
| M10 | **Bikes compartilhadas em condomínio (Curi)** — produto separado | App morador, IoT, caução | Separado |

## 4. Atores, papéis e controle de acesso (RBAC)

Reúsa o padrão de **ACL por CPF** da intranet (`admin_permissions` + `getIntranetCpf` + OTP por WhatsApp), com papéis próprios da locação:

| Papel | Quem | Pode |
|---|---|---|
| `locacao_admin` | Victor, Fábio | Tudo: contratos, frota, OS, peças, faturamento, painéis |
| `locacao_coordenador` | Fábio | Aprovar OS/orçamento, despachar mecânicos, ver inadimplência |
| `locacao_admin_op` | Carol | Montar orçamento, aprovar pedido de peça, falar com cliente, faturar |
| `locacao_mecanico` | 3 mecânicos | App de campo: pegar OS, laudo+foto, pedir peça, baixar peça do baú |
| `locacao_financeiro` | Financeiro | Ver faturas, marcar pagamento, inadimplência |
| `locacao_gestor_cliente` | Gestor de frota **do cliente** (Claro/Google) | Ver **só as bikes/OS/faturas da própria conta** (multi-tenant) |

> **Atenção:** o `locacao_gestor_cliente` é **RBAC multi-tenant novo** — nenhum subsistema atual (CRM `vendedor/gestor`, Desk `loja`) cobre "o cliente externo vê só a frota dele". Precisa ser desenhado com isolamento rígido por `conta_id` (não misturar com o permissionamento "qualquer CPF autenticado" que o estoque/chat usam).

Todas as tabelas `locacao_*` seguem o padrão **RLS service-role-only** (RLS ON + `REVOKE` anon/authenticated, sem policies); todo acesso passa por `/api/intranet/locacao/*` com validação de CPF + papel.

---

## 5. Módulos detalhados

> Cada módulo: **objetivo · escopo · fluxo · dados-chave · reúso · dependências/gotchas**.

### M1 — Clientes corporativos, contratos e frota

**Objetivo:** ter a fonte de verdade de _quem aluga, o quê, sob qual contrato_.

**Escopo / o que contempla:**
- **Conta corporativa** (1 CNPJ → cruza com `TGFPAR.CODPARC` por leitura): Zona Sul, Claro, Vivo, Google…
- **Bases/endereços do cliente** (Zona Sul tem 3 bases; bikes podem transitar entre elas — **não assumir local fixo**).
- **Contrato**: mensalidade por bike, condições, vigência, modelo de cobrança (ver M7), SLA de atendimento.
- **Frota**: cada bike (numerada por **chassi**), modelo (geralmente **L plus**, mais robusta), customizações (ex.: cargueira "pino-bola" da Zona Sul), base atual, status (`ativa`/`manutenção`/`recolhida`).
- **Condutores/usuários do cliente** (quem usa a bike, para o gestor de frota do cliente).
- **Provisionamento de bike**: fluxo de _solicitar bike à Oficina Central / Restauração / Expedição → OC monta → mecânico customiza → entra em campo_ (registra a origem: zero, usada-restaurada).

**Dados-chave:** `locacao_conta`, `locacao_base`, `locacao_contrato`, `locacao_bike`, `locacao_condutor` (Seção 6).

**Reúso:** cruzamento CNPJ→CODPARC pelo padrão do CRM (`src/lib/crm/sankhya-cross.ts`); cadastro de bike por chassi já existe (`AD_EQUIPBIKE`/`AD_EQUIPCAD`, leitura + insert provados). Layout/cards via `IntranetPageLayout`.

**Gotchas:** `AD_EQUIPBIKE` é **insert-only** (sem UPDATE in-place via API) e ~10% das bikes não têm chassi → **rastrear o ativo alugado por `contrato`/`locacao_bike` no Supabase**, não por titularidade no Sankhya (decisão D7).

---

### M2 — Entrada de demanda (Inbox da Locação + lead B2B)

**Objetivo:** capturar toda demanda num só lugar e transformá-la em tarefa/OS — acabar com o "3× retrabalho".

**Escopo / o que contempla:**
- **Inbox de atendimento** dos clientes que hoje falam por **grupo de WhatsApp** (Zona Sul) → reusar o **Lev Desk** (inbox multi-agente Cloud API): conversa 1-1 cliente↔número da locação, atribuição, timeline, busca, mídia.
- **Entrada VOLL/chamado**: substituir a integração VOLL (descartada) por uma entrada simples no Lev (formulário/registro) — _"vai atender o que a VOLL faz"_.
- **Captura de lead B2B novo**: o chatbot do site **já roteia** "aluguel corporativo/frota/empresa" para o canal `locacao_corporativa` (IVR "Opção 6", central 5521980220130) e gera lead. Plugar esse lead num **pipeline B2B** (prospecção de novos contratos).
- **Da demanda → OS:** toda mensagem do cliente vira (ou anexa a) uma **OS** (M3), com a conversa linkada.

**Dados-chave:** reusa `desk_conversations`/`desk_messages`; novo `locacao_demanda` (ponte conversa→OS) e `locacao_lead_b2b`.

**Reúso:** **Lev Desk** inteiro (migs 164-170: inbox, atribuição, realtime, templates HSM, mídia, busca FTS pt). Captura via `src/lib/crm/desk-capture.ts`. Lead já existe no chatbot (`promptManager.ts`).

**Dependências/gotchas:**
- **Lev Desk Fase 0 (Meta/WABA) está bloqueada** (verificação Business, número, ~2–4 semanas). Sem ela, o inbox real do WhatsApp não liga. **Mitigação:** começar a OS (M3) independente do canal; o número da locação pode entrar quando a Fase 0 destravar.
- **Janela 24h da Meta:** mensagem proativa fora de 24h exige **template HSM aprovado** — mesma trava que pausou o "acionamento" e o menu VOLL. Acionar o mecânico/cliente "do nada" por WhatsApp **não fecha sem template**.

---

### M3 — Ordem de Serviço de campo (o coração operacional)

**Objetivo:** dar ao mecânico uma OS fácil no celular, com **evidência técnica** que encerra disputas e alimenta faturamento e estoque.

**Escopo / o que contempla:**
- **Board/lista de OS** com **prioridade** (a bike "não pode ficar parada" = prejuízo). Mecânicos são intercambiáveis → modelo "puxar tarefa da fila" (qualquer um pega).
- **Programação diária dos mecânicos** (matriz pessoa × dia × base × tarefa) — reduz dependência do Fábio.
- **OS no celular** (formulário mobile): tipo (preventiva/corretiva/preparação), bike (chassi), base, problema relatado.
- **Laudo de diagnóstico** (antes): **foto** da peça quebrada + descrição → pedido do Schubert/Anne.
- **Relato por áudio → IA → OS/laudo:** mecânico fala, a IA transcreve e estrutura (peças, serviços) — reúso direto do `src/lib/crm/audio-extract.ts` (Whisper + extração JSON).
- **Laudo de fechamento** (depois): **foto** do serviço concluído + checklist.
- **Vínculo serviço↔cliente↔data** (comprova que o mecânico esteve lá), com **empilhamento de OS por cliente/bike** (histórico).
- **Aprovação na hora** (cenário comum: cliente aprova e o serviço sai imediato).

**Dados-chave:** `locacao_os`, `locacao_os_item` (serviço/peça), `locacao_os_laudo` (diagnóstico|fechamento + fotos), `locacao_programacao`.

**Reúso:** o **modelo de OS de campo do Obras** (`docs/obras/07-manutencao-e-chamados.md` + `08-custos-e-relatorios.md`) é o análogo **certo** (357 OS/2025, priorização GUT, matriz de programação) — **não** o Kanban de vendas do CRM. Áudio→IA do CRM. Fotos via bucket privado + retenção (padrão `estoque_conferencia`).

**Gotchas:** a OS hoje é montada **manualmente por Carol no Sankhya**. Aqui ela passa a nascer rica no Supabase; **se/como espelhar no Sankhya é decisão fiscal (M9/D2)** — não pré-requisito do MVP.

---

### M4 — Orçamento e aprovação durável do cliente

**Objetivo:** orçamento formal com aceite **durável** do cliente (não some no WhatsApp).

**Escopo / o que contempla:**
- Carol (ou IA, a partir do laudo) **monta o orçamento** (serviços + peças com preço).
- Envio ao cliente por **e-mail/link** (não só WhatsApp): cliente clica e **aprova/reprova** → fica registrado (quem, quando, IP).
- **Aceite registrado** encerra a disputa "mandei fazer / não mandei".
- Suporta o **aprovar-na-hora** (mecânico em campo) e o assíncrono (gestor aprova depois).
- Pós-aprovação: OS sai para execução; valores fluem para faturamento (M7).

**Dados-chave:** `locacao_orcamento`, `locacao_orcamento_item`, `locacao_aprovacao` (token, status, timestamps).

**Reúso:** padrão de **grant/link durável** já usado no chatbot (`createDocLinkGrant`) e e-mail branded (Resend, `lev_email_brand_kit`). Token de aprovação igual ao QR/token do CRM.

**Gotchas:** o cliente "só quer comunicação" (não quer portal pesado) → link de aprovação **um clique**, sem login.

---

### M5 — Custódia de peças no baú da moto (dor nº 1)

**Objetivo:** controlar o estoque móvel em posse dos mecânicos, eliminando a "fuga não controlada de produto".

> Conceito-chave: **não é transferência entre dois depósitos fixos** — é **estoque consignado em posse de pessoa móvel** ("carteira de peças por mecânico"). É um modelo de **custódia**: saldo por mecânico, baixa contra OS, devolução, recontagem/acerto.

**Escopo / o que contempla:**
- Cada **baú** (mecânico) é um **local de estoque** com **mini-inventário** (poucas peças, 1 de cada).
- **Carregar/levar** peça: registra saída do estoque central → para o baú (com número de série quando aplicável).
- **Consumir** peça: baixa **contra a OS** (liga peça → serviço → cliente).
- **Devolver** peça não usada (hoje não devolvem — o sistema cria o fluxo).
- **Recontagem/acerto** periódico (conferência do baú) → divergência vira evento auditável.
- **Número de série** por peça crítica (bateria, controladora) — rastreabilidade que o Schubert pediu ("saiu com uma, voltou com outra").

**Dados-chave:** `locacao_custodia_saldo` (mecânico × produto × série), `locacao_custodia_mov` (entrada/baixa/devolução/acerto), reusa fotos/seriais da conferência.

**Reúso:** workflow de **conferência de mercadorias** (migs 263-265: entrada/saída, foto, **OCR de série** chassi/motor/bateria, audit log). Posição de estoque (`estoque_posicao`, mig 196) para o saldo central.

**Gotchas:** **transferência inter-depósito não existe** no código — é build novo. Não modelar como `estoque_transferencia` genérica; modelar como **custódia por colaborador** (o valor está em "quem está com a peça e o que ela virou").

---

### M6 — Reposição de peças (modelo Obras) + medição de demanda represada

**Objetivo:** acabar com a compra reativa e **medir** o que se perde por falta de peça.

**Escopo / o que contempla:**
- **Pedido de peça pelo celular** (mecânico): adiciona itens de um **catálogo** (de-para apelido→Sankhya), gera pedido, **Carol só revisa e aprova** — **exatamente** o fluxo do Obras (Júlio→Naire).
- **Busca semântica** de material (embeddings) para resolver o de-para apelido→`CODPROD`.
- **Demanda represada:** quando uma OS **não pôde ser atendida por falta de peça**, registrar isso (não fechar a OS "com o que tem" e perder o sinal). Acumular: "X serviços represados", "Y bikes/contratos parados por falta de pastilha".
- **Subsídio à compra:** relatório de consumo + represamento por peça → Compras decide comprar **200 mil e não 20 mil** com base em dado, não em reação. (Rodrigo e Anne já curtiram a ideia.)

**Dados-chave:** `locacao_pedido_peca`, `locacao_pedido_item`, `locacao_represamento`; catálogo reusando `obras_material_catalogo`.

**Reúso:** **fluxo de solicitação do Obras** (telas + APIs + catálogo + aprovação 2-fases + embeddings) é o template direto. Mark-and-sweep do `sync-estoque.mjs`.

**Gotchas:** o de-para Obras→Sankhya está **0/89 preenchido** (curadoria pendente) — a locação terá o **mesmo pré-requisito de dados** (curar de-para de peças de bike). A escrita do pedido no Sankhya (TOP 401) **baixa estoque automaticamente** e está atrás da flag `OBRAS_REQUISICAO_SANKHYA_LIVE` (OFF) — para a locação isso é **M9/Onda 3**, não MVP. No MVP, o pedido de peça vive no Supabase e dispara aviso/e-mail para Carol/Compras (como o Obras faz hoje).

### M7 — Faturamento (mensalidade + serviço + peça) e inadimplência

**Objetivo:** automatizar a cobrança composta e dar **visibilidade de inadimplência** ao financeiro.

**Escopo / o que contempla:**
- **Mensalidade recorrente** por bike/contrato.
- **Cobrança variável por evento:** serviço avulso + peça consumida (da OS aprovada).
- **Fatura consolidada** por cliente/mês (mensalidade + Σserviços + Σpeças).
- **(Opcional/futuro)** o modelo de **crédito/caução** que o Fábio mencionou ("paga mensalidade + um crédito que vai descontando serviço/peça") — **incerto, depende do Rodrigo** (D1). Modelar como _carteira de crédito por contrato_ se confirmado.
- **Inadimplência:** máquina de estados (em dia → atrasado → suspenso), painel para o financeiro, alerta.
- **Ponte com o financeiro:** hoje é um e-mail → boleto. O sistema pode (a) automatizar a recorrente via gateway, e (b) consolidar os variáveis numa fatura que o financeiro emite. Decisão D1/D2.

**Dados-chave:** `locacao_fatura`, `locacao_fatura_item`, `locacao_pagamento`, (opcional) `locacao_credito_carteira`.

**Reúso:** **Lev Prime é um motor de assinatura recorrente já em produção** (`src/lib/levprime/`): Pagar.me (`pagarme.ts`, `pagarme-billing.ts`, planos V5), Mercado Pago preapproval (`mercado-pago.ts`), `subscription-store.ts`, webhook HMAC. **A mensalidade da locação é "Lev Prime com outro rótulo"** — avaliar reusar **antes** de cogitar NF recorrente no Sankhya (que o Jean classificou como "pesada").

**Gotchas:** **faturamento composto** (mensalidade fixa + variável por evento) **não tem análogo pronto** — o Lev Prime cobre só a parte fixa; o "carrinho variável sobre assinatura" é build novo. **Inadimplência/dunning** = zero cobertura hoje. **Caução** (condomínio) usa **pré-autorização/hold de cartão**, que **nenhum gateway no código faz hoje** (só cobrança/assinatura) → fluxo novo (e é do M10, não daqui).

**Objetivo:** tirar a operação da cabeça do Fábio e dar números a todos.

**Escopo / o que contempla:**

**Objetivo:** registrar o escopo do produto de condomínio para não contaminar o MVP corporativo, e deixá-lo pronto para virar projeto próprio.

**Escopo / o que contempla (da reunião Curi):**

**O que dá para entregar já (sem hardware):** o **mockup visual** do painel do síndico/app (deliverable do Victor para a Curi) — reusando os componentes de mapa/frota (`GeoHeatmap`, painel de rastreamento) como base estática.

## 8. Integração Sankhya — realidade e estratégia (crítico)

**O que ESTÁ pronto e vivo (leitura):** queries DbExplorer via OAuth2 (token L2 cacheado no Supabase, `sankhya_token_cache`), parceiro (TGFPAR), bike (AD_EQUIPBIKE/AD_EQUIPCAD), estoque (TGFEST), TOP (TGFTOP).

**O que está pronto mas limitado (escrita):** cadastro de parceiro e bike via `DatasetSP.save` (provado 19/06). **Limitação dura:** em entidade-detalhe o `DatasetSP.save` **só INSERE** — **não há UPDATE in-place** (cai em ORA-01400). Mudança de estado de ativo no ERP = manual ou delete+reinsert arriscado.

**O que NÃO está pronto (e é o maior risco do plano):** **gerar documento** (TGFCAB/TGFITE — OS, pedido, NF). No projeto de **Obras isso foi provado ponta-a-ponta (NUNOTA 632107) e DEPOIS ABANDONADO** porque o gatilho `TRG_UPT_TGFEST` **baixa estoque automaticamente** e a natureza fiscal (TOP, parceiro/produto ativo, situação tributária) é frágil. **Hoje o Obras nem escreve no ERP** — manda e-mail para a Naire comprar manual. A locação vai esbarrar **exatamente** nos mesmos gatilhos ao tentar faturar/emitir documento.

**Riscos sistêmicos:**
- **SPOF de credencial** (`tecnologia@`): 3 apagões em junho; um de 5h por renomear env var. Botar faturamento de cliente corporativo sobre esse ponto único é perigoso → **appkey dedicado** antes da Onda 3.
- **Atribuição = CODUSU 252 (Victor):** toda escrita sai "alterado por VICTORCRUZ" (já assustou cliente). **Faturar locação no nome pessoal do Victor é inaceitável em auditoria** → credencial de locação (depende do Jean, não é self-service).

**Estratégia adotada no plano:** **Sankhya = registro fiscal/cadastral de leitura (read + insert-once)**; estado mutável de locação no Supabase; espelhar no ERP só nos marcos fiscais, na Onda 3, atrás de flag/dry-run.

8. **M2 (pleno) — Inbox WhatsApp** quando a Fase 0 Meta destravar; **pipeline B2B** plugando o lead do chatbot.

### Onda 3 — Travada por governança/terceiros (só quando destravar)

### Fora do escopo da locação corporativa (produto separado)

const heads=[...el.querySelectorAll('h2,h3')];
heads.forEach(h=>{
  let s=h.textContent.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  if(used[s]) s+='-'+(++used[s]); else used[s]=1;
  h.id=s;
  const a=document.createElement('a'); a.href='#'+s; a.textContent=h.textContent.replace(/\s+/g,' ').trim();
  if(h.tagName==='H3') a.className='h3'; toc.appendChild(a);
});
const links=[...toc.querySelectorAll('a')];
const map=new Map(links.map(a=>[a.getAttribute('href').slice(1),a]));
const obs=new IntersectionObserver(es=>{es.forEach(e=>{ if(e.isIntersecting){ links.forEach(l=>l.classList.remove('active')); const a=map.get(e.target.id); if(a){a.classList.add('active'); a.scrollIntoView({block:'nearest'});} }});},{rootMargin:'-10% 0px -80% 0px'});
heads.forEach(h=>obs.observe(h));
</script>
